name: deploy-azure-static-web

on:
  push:
    branches:
      - main
    paths:
      - "multi-cloud-faas-platform/azure/frontend/**"
      - ".github/workflows/deploy-azure-static-web.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Deploy frontend to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "upload"
          app_location: "multi-cloud-faas-platform/azure/frontend"
          api_location: ""
          output_location: ""