AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: AWS root SAM template for the multi-cloud FaaS platform.

Parameters:
  ProjectName:
    Type: String
    Description: Project name used for resource naming.
    Default: multi-cloud-faas

  Environment:
    Type: String
    Description: Deployment environment.
    Default: dev
    AllowedValues:
      - dev
      - test
      - prod

  AuthDomainPrefix:
    Type: String
    Description: Unique Cognito Hosted UI domain prefix.
    AllowedPattern: "^[a-z0-9][a-z0-9-]{1,61}[a-z0-9]$"
    ConstraintDescription: Use 3-63 lowercase letters, numbers, and hyphens. Must start and end with a letter or number.

  CallbackUrl:
    Type: String
    Description: Frontend callback URL after successful login.
    Default: http://localhost:3000/callback

  LogoutUrl:
    Type: String
    Description: Frontend URL after logout.
    Default: http://localhost:3000/logout

  UserPoolDeletionProtection:
    Type: String
    Description: Use ACTIVE for long-lived environments. Use INACTIVE for lab testing.
    Default: INACTIVE
    AllowedValues:
      - ACTIVE
      - INACTIVE

Resources:
  AuthStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: infra/auth/template.yaml
      Parameters:
        ProjectName: !Ref ProjectName
        Environment: !Ref Environment
        AuthDomainPrefix: !Ref AuthDomainPrefix
        CallbackUrl: !Ref CallbackUrl
        LogoutUrl: !Ref LogoutUrl
        UserPoolDeletionProtection: !Ref UserPoolDeletionProtection
      Tags:
        Project: !Ref ProjectName
        Environment: !Ref Environment
        Layer: auth

Outputs:
  UserPoolId:
    Description: Cognito User Pool ID.
    Value: !GetAtt AuthStack.Outputs.UserPoolId

  UserPoolArn:
    Description: Cognito User Pool ARN.
    Value: !GetAtt AuthStack.Outputs.UserPoolArn

  UserPoolClientId:
    Description: Cognito App Client ID.
    Value: !GetAtt AuthStack.Outputs.UserPoolClientId

  HostedUIDomain:
    Description: Cognito Hosted UI domain.
    Value: !GetAtt AuthStack.Outputs.HostedUIDomain

  HostedUILoginUrl:
    Description: Hosted UI login URL.
    Value: !GetAtt AuthStack.Outputs.HostedUILoginUrl

  HostedUILogoutUrl:
    Description: Hosted UI logout URL.
    Value: !GetAtt AuthStack.Outputs.HostedUILogoutUrl

  UserPoolIssuer:
    Description: Cognito JWT issuer URL.
    Value: !GetAtt AuthStack.Outputs.UserPoolIssuer

  UserPoolJwksUrl:
    Description: Cognito public key URL for JWT validation.
    Value: !GetAtt AuthStack.Outputs.UserPoolJwksUrl
