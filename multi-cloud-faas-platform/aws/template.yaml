AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: AWS root SAM template for the multi-cloud FaaS platform.

Parameters:
  ProjectName:
    Type: String
    Description: Project name used for resource naming.
    Default: multi-cloud-faas

  Environment:
    Type: String
    Description: Deployment environment.
    Default: dev
    AllowedValues:
      - dev
      - test
      - prod

  AuthDomainPrefix:
    Type: String
    Description: Unique Cognito Hosted UI domain prefix.
    AllowedPattern: "^[a-z0-9][a-z0-9-]{1,61}[a-z0-9]$"
    ConstraintDescription: Use 3-63 lowercase letters, numbers, and hyphens. Must start and end with a letter or number.

  FrontendBaseUrl:
    Type: String
    Description: Frontend base URL without trailing slash.
    Default: https://blue-wave-0c8589a0f.7.azurestaticapps.net

  UserPoolDeletionProtection:
    Type: String
    Description: Use ACTIVE for long-lived environments. Use INACTIVE for lab testing.
    Default: INACTIVE
    AllowedValues:
      - ACTIVE
      - INACTIVE

Resources:
  AuthStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: infra/auth/template.yaml
      Parameters:
        ProjectName: !Ref ProjectName
        Environment: !Ref Environment
        AuthDomainPrefix: !Ref AuthDomainPrefix
        CallbackUrl: !Sub "${FrontendBaseUrl}/callback"
        LogoutUrl: !Sub "${FrontendBaseUrl}/"
        UserPoolDeletionProtection: !Ref UserPoolDeletionProtection
      Tags:
        Project: !Ref ProjectName
        Environment: !Ref Environment
        Layer: auth

  StorageStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: infra/storage/template.yaml
      Parameters:
        ProjectName: !Ref ProjectName
        Environment: !Ref Environment
        FrontendBaseUrl: !Ref FrontendBaseUrl
      Tags:
        Project: !Ref ProjectName
        Environment: !Ref Environment
        Layer: storage

  DataStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: infra/data/template.yaml
      Parameters:
        ProjectName: !Ref ProjectName
        Environment: !Ref Environment
      Tags:
        Project: !Ref ProjectName
        Environment: !Ref Environment
        Layer: data

  ApiStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: infra/api/template.yaml
      Parameters:
        ProjectName: !Ref ProjectName
        Environment: !Ref Environment

        UserPoolIssuer: !GetAtt AuthStack.Outputs.UserPoolIssuer
        UserPoolClientId: !GetAtt AuthStack.Outputs.UserPoolClientId
        CorsAllowedOrigins: !Sub "${FrontendBaseUrl},http://localhost:3000,http://localhost:5173"

        StorageBucketName: !GetAtt StorageStack.Outputs.StorageBucketName
        AssetsPrefix: !GetAtt StorageStack.Outputs.AssetsPrefix

        MediaTableName: !GetAtt DataStack.Outputs.MediaTableName
        MediaTableArn: !GetAtt DataStack.Outputs.MediaTableArn
      Tags:
        Project: !Ref ProjectName
        Environment: !Ref Environment
        Layer: api

Outputs:
  UserPoolId:
    Description: Cognito User Pool ID.
    Value: !GetAtt AuthStack.Outputs.UserPoolId

  UserPoolClientId:
    Description: Cognito App Client ID.
    Value: !GetAtt AuthStack.Outputs.UserPoolClientId

  HostedUIDomain:
    Description: Cognito Hosted UI domain.
    Value: !GetAtt AuthStack.Outputs.HostedUIDomain

  HostedUILoginUrl:
    Description: Cognito Hosted UI login URL.
    Value: !GetAtt AuthStack.Outputs.HostedUILoginUrl

  HostedUILogoutUrl:
    Description: Cognito Hosted UI logout URL.
    Value: !GetAtt AuthStack.Outputs.HostedUILogoutUrl

  ApiEndpoint:
    Description: API Gateway HTTP API endpoint.
    Value: !GetAtt ApiStack.Outputs.ApiEndpoint

  StorageBucketName:
    Description: S3 bucket name for private media assets.
    Value: !GetAtt StorageStack.Outputs.StorageBucketName

  AssetsPrefix:
    Description: S3 prefix for private media assets.
    Value: !GetAtt StorageStack.Outputs.AssetsPrefix

  MediaTableName:
    Description: DynamoDB table name for media metadata.
    Value: !GetAtt DataStack.Outputs.MediaTableName