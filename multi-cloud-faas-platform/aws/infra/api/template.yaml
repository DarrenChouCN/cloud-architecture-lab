AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: API Gateway layer for the multi-cloud FaaS platform.

Parameters:
  ProjectName:
    Type: String
    Description: Project name used for resource naming.

  Environment:
    Type: String
    Description: Deployment environment.
    AllowedValues:
      - dev
      - test
      - prod

  UserPoolIssuer:
    Type: String
    Description: Cognito User Pool issuer URL.

  UserPoolClientId:
    Type: String
    Description: Cognito User Pool App Client ID used as JWT audience.

  CorsAllowedOrigins:
    Type: CommaDelimitedList
    Description: Allowed frontend origins for browser requests.
    Default: "http://localhost:3000,http://localhost:5173"

  StorageBucketName:
    Type: String
    Description: S3 bucket used for private image assets.

  AssetsPrefix:
    Type: String
    Description: S3 prefix for private image assets.
    Default: assets/

  MediaTableName:
    Type: String
    Description: DynamoDB table name for media metadata.

  MediaTableArn:
    Type: String
    Description: DynamoDB table ARN for media metadata.

  QueryFileAnalysisEndpoint:
    Type: String
    Default: "https://wildlife-ml-worker.blackglacier-fc4a347e.australiaeast.azurecontainerapps.io/analyze-query-file"
    Description: Azure endpoint for analyzing temporary query files.

  QueryFileRequestTimeout:
    Type: Number
    Default: 25
    Description: Timeout in seconds for calling the Azure query file analysis endpoint.

Resources:
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      Name: !Sub "${ProjectName}-${Environment}-api"

      CorsConfiguration:
        AllowOrigins: !Ref CorsAllowedOrigins
        AllowHeaders:
          - Authorization
          - Content-Type
          - X-Amz-Date
          - X-Api-Key
          - X-Amz-Security-Token
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        MaxAge: 600

      Auth:
        DefaultAuthorizer: CognitoJwtAuthorizer
        Authorizers:
          CognitoJwtAuthorizer:
            IdentitySource: "$request.header.Authorization"
            JwtConfiguration:
              issuer: !Ref UserPoolIssuer
              audience:
                - !Ref UserPoolClientId

      Tags:
        Project: !Ref ProjectName
        Environment: !Ref Environment
        Layer: api

  UploadInitFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-${Environment}-upload-init"
      Runtime: python3.12
      Handler: app.lambda_handler
      CodeUri: ../../src/upload_init/
      Timeout: 10
      MemorySize: 128

      # For AWS Academy account
      Role: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/LabRole"

      Environment:
        Variables:
          MEDIA_BUCKET: !Ref StorageBucketName
          MEDIA_TABLE: !Ref MediaTableName
          ASSETS_PREFIX: !Ref AssetsPrefix
          PRESIGNED_URL_EXPIRES_IN: "3600"

      # For creating Lambda execution role
      # Policies:
      #   - Statement:
      #       - Effect: Allow
      #         Action:
      #           - s3:PutObject
      #         Resource: !Sub "arn:${AWS::Partition}:s3:::${StorageBucketName}/${AssetsPrefix}/*"

      #       - Effect: Allow
      #         Action:
      #           - dynamodb:PutItem
      #           - dynamodb:GetItem
      #           - dynamodb:UpdateItem
      #         Resource: !Ref MediaTableArn

      Events:
        UploadInitRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /uploads/init
            Method: POST
            Auth:
              Authorizer: CognitoJwtAuthorizer

  MediaApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-${Environment}-media-api"
      Runtime: python3.12
      Handler: app.lambda_handler
      CodeUri: ../../src/media_api/
      Timeout: 20
      MemorySize: 256

      # For AWS Academy account
      Role: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/LabRole"

      Environment:
        Variables:
          MEDIA_BUCKET: !Ref StorageBucketName
          MEDIA_TABLE: !Ref MediaTableName
          ASSETS_PREFIX: !Ref AssetsPrefix
          PRESIGNED_URL_EXPIRES_IN: "3600"

      # For creating Lambda execution role
      # Policies:
      #   - Statement:
      #       - Effect: Allow
      #         Action:
      #           - s3:GetObject
      #           - s3:DeleteObject
      #         Resource: !Sub "arn:${AWS::Partition}:s3:::${StorageBucketName}/${AssetsPrefix}*"

      #       - Effect: Allow
      #         Action:
      #           - dynamodb:GetItem
      #           - dynamodb:Query
      #           - dynamodb:Scan
      #           - dynamodb:UpdateItem
      #           - dynamodb:DeleteItem
      #           - dynamodb:BatchGetItem
      #           - dynamodb:BatchWriteItem
      #         Resource:
      #           - !Ref MediaTableArn
      #           - !Sub "${MediaTableArn}/index/*"

      Events:
        QueryTagsRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /query/tags
            Method: POST
            Auth:
              Authorizer: CognitoJwtAuthorizer

        QuerySpeciesRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /query/species
            Method: GET
            Auth:
              Authorizer: CognitoJwtAuthorizer

        QueryThumbnailRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /query/thumbnail
            Method: POST
            Auth:
              Authorizer: CognitoJwtAuthorizer

        BulkTagsRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /tags/bulk
            Method: POST
            Auth:
              Authorizer: CognitoJwtAuthorizer

        DeleteFilesRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /files/delete
            Method: POST
            Auth:
              Authorizer: CognitoJwtAuthorizer

      Tags:
        Project: !Ref ProjectName
        Environment: !Ref Environment
        Layer: api
        Component: media-api

  QueryByFileFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-${Environment}-query-by-file"
      Runtime: python3.12
      Handler: app.lambda_handler
      CodeUri: ../../src/query_by_file/
      Timeout: 28
      MemorySize: 512

      # For AWS Academy account
      Role: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/LabRole"

      Environment:
        Variables:
          MEDIA_BUCKET: !Ref StorageBucketName
          MEDIA_TABLE: !Ref MediaTableName
          ASSETS_PREFIX: !Ref AssetsPrefix
          PRESIGNED_URL_EXPIRES_IN: "3600"
          QUERY_FILE_ANALYSIS_ENDPOINT: !Ref QueryFileAnalysisEndpoint
          QUERY_FILE_REQUEST_TIMEOUT: !Ref QueryFileRequestTimeout
          QUERY_FILE_TEMP_PREFIX: "query-temp/"
          MODEL_VERSION: "current"

      # Policies:
      #   - Statement:
      #       - Effect: Allow
      #         Action:
      #           - s3:PutObject
      #           - s3:GetObject
      #           - s3:DeleteObject
      #         Resource: !Sub "arn:${AWS::Partition}:s3:::${StorageBucketName}/query-temp/*"

      #       - Effect: Allow
      #         Action:
      #           - dynamodb:GetItem
      #           - dynamodb:Query
      #           - dynamodb:Scan
      #         Resource:
      #           - !Ref MediaTableArn
      #           - !Sub "${MediaTableArn}/index/*"

      Events:
        QueryByFileRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /query/by-file
            Method: POST
            Auth:
              Authorizer: CognitoJwtAuthorizer

      Tags:
        Project: !Ref ProjectName
        Environment: !Ref Environment
        Layer: api
        Component: query-by-file

Outputs:
  ApiId:
    Description: API Gateway HTTP API ID.
    Value: !Ref HttpApi

  ApiEndpoint:
    Description: API Gateway HTTP API endpoint.
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}"

  CognitoAuthorizerName:
    Description: Cognito JWT authorizer name used by this API.
    Value: CognitoJwtAuthorizer

  MediaApiFunctionName:
    Description: Media API Lambda function name.
    Value: !Ref MediaApiFunction

  MediaApiFunctionArn:
    Description: Media API Lambda function ARN.
    Value: !GetAtt MediaApiFunction.Arn

  QueryByFileFunctionName:
    Description: Query by file Lambda function name.
    Value: !Ref QueryByFileFunction

  QueryByFileFunctionArn:
    Description: Query by file Lambda function ARN.
    Value: !GetAtt QueryByFileFunction.Arn