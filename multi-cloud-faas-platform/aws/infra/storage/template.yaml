AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: S3 storage layer for the multi-cloud FaaS platform.

Parameters:
  ProjectName:
    Type: String
    Description: Project name used for resource naming.
    Default: multi-cloud-faas

  Environment:
    Type: String
    Description: Deployment environment.
    Default: dev
    AllowedValues:
      - dev
      - test
      - prod

  FrontendBaseUrl:
    Type: String
    Description: Frontend base URL allowed to upload files to S3.

  WebPrefix:
    Type: String
    Description: S3 key prefix for static frontend files.
    Default: web/

  AssetsPrefix:
    Type: String
    Description: S3 key prefix for private image assets.
    Default: assets/

  MediaTableName:
    Type: String
    Description: DynamoDB table name for media metadata.

  MediaTableArn:
    Type: String
    Description: DynamoDB table ARN for media metadata.

  AzureProcessingEndpoint:
    Type: String
    Description: Azure Function HTTP endpoint for media processing.
    Default: ""

Resources:
  StorageBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-${Environment}-storage-${AWS::AccountId}-${AWS::Region}"

      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced

      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

      VersioningConfiguration:
        Status: Enabled

      CorsConfiguration:
        CorsRules:
          - AllowedOrigins:
              - !Ref FrontendBaseUrl
              - http://localhost:3000
              - http://localhost:5173
            AllowedMethods:
              - PUT
              - GET
              - HEAD
            AllowedHeaders:
              - "*"
            ExposedHeaders:
              - ETag
            MaxAge: 3000

      LifecycleConfiguration:
        Rules:
          - Id: AbortIncompleteMultipartUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7

          - Id: ExpireNoncurrentObjectVersions
            Status: Enabled
            NoncurrentVersionExpirationInDays: 30

      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Layer
          Value: storage

      NotificationConfiguration:
        LambdaConfigurations:
          - Event: s3:ObjectCreated:*
            Function: !GetAtt MediaIngestFunction.Arn
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: !Ref AssetsPrefix

  MediaIngestFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-${Environment}-media-ingest"
      Runtime: python3.12
      Handler: app.lambda_handler
      CodeUri: ../../src/media_ingest/
      Timeout: 30
      MemorySize: 128
      # For AWS Academy account
      Role: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/LabRole"

      Environment:
        Variables:
          MEDIA_TABLE: !Ref MediaTableName
          ASSETS_PREFIX: !Ref AssetsPrefix
          AZURE_PROCESSING_ENDPOINT: !Ref AzureProcessingEndpoint
          PRESIGNED_URL_EXPIRES_IN: "3600"

      # Policies:
      #   - Statement:
      #       - Effect: Allow
      #         Action:
      #           - s3:GetObject
      #         Resource: !Sub "${StorageBucket.Arn}/${AssetsPrefix}*"

      #       - Effect: Allow
      #         Action:
      #           - dynamodb:GetItem
      #           - dynamodb:UpdateItem
      #         Resource: !Ref MediaTableArn

  MediaIngestFunctionInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref MediaIngestFunction
      Principal: s3.amazonaws.com
      SourceAccount: !Ref AWS::AccountId

Outputs:
  StorageBucketName:
    Description: Name of the S3 bucket used for web files and private assets.
    Value: !Ref StorageBucket

  StorageBucketArn:
    Description: ARN of the S3 storage bucket.
    Value: !GetAtt StorageBucket.Arn

  StorageBucketRegionalDomainName:
    Description: Regional domain name of the S3 bucket for CloudFront origin configuration.
    Value: !GetAtt StorageBucket.RegionalDomainName

  WebPrefix:
    Description: Prefix used for static frontend files.
    Value: !Ref WebPrefix

  AssetsPrefix:
    Description: Prefix used for private image assets.
    Value: !Ref AssetsPrefix

  WebObjectsArn:
    Description: ARN pattern for static frontend objects.
    Value: !Sub "${StorageBucket.Arn}/${WebPrefix}*"

  AssetObjectsArn:
    Description: ARN pattern for private image asset objects.
    Value: !Sub "${StorageBucket.Arn}/${AssetsPrefix}*"

  MediaIngestFunctionName:
    Description: Name of the S3-triggered media ingest function.
    Value: !Ref MediaIngestFunction

  MediaIngestFunctionArn:
    Description: ARN of the S3-triggered media ingest function.
    Value: !GetAtt MediaIngestFunction.Arn