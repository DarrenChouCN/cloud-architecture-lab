AWSTemplateFormatVersion: "2010-09-09"
Description: DynamoDB data layer for the multi-cloud FaaS platform.

Parameters:
  ProjectName:
    Type: String
    Description: Project name used for resource naming.

  Environment:
    Type: String
    Description: Deployment environment.
    AllowedValues:
      - dev
      - test
      - prod

Resources:
  MediaTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ProjectName}-${Environment}-media"

      BillingMode: PAY_PER_REQUEST

      AttributeDefinitions:
        - AttributeName: MediaId
          AttributeType: S
        - AttributeName: Checksum
          AttributeType: S
        - AttributeName: OwnerUserId
          AttributeType: S
        - AttributeName: CreatedAt
          AttributeType: S

      KeySchema:
        - AttributeName: MediaId
          KeyType: HASH

      GlobalSecondaryIndexes:
        - IndexName: ChecksumIndex
          KeySchema:
            - AttributeName: Checksum
              KeyType: HASH
          Projection:
            ProjectionType: ALL

        - IndexName: UserUploadsIndex
          KeySchema:
            - AttributeName: OwnerUserId
              KeyType: HASH
            - AttributeName: CreatedAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

      SSESpecification:
        SSEEnabled: true

      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Layer
          Value: data

Outputs:
  MediaTableName:
    Description: DynamoDB table name for media metadata.
    Value: !Ref MediaTable

  MediaTableArn:
    Description: DynamoDB table ARN for media metadata.
    Value: !GetAtt MediaTable.Arn

  ChecksumIndexName:
    Description: GSI used to check whether a file already exists by checksum.
    Value: ChecksumIndex

  UserUploadsIndexName:
    Description: GSI used to list uploads by Cognito user.
    Value: UserUploadsIndex