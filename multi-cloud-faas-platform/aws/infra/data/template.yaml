AWSTemplateFormatVersion: "2010-09-09"
Description: DynamoDB data layer for the multi-cloud FaaS platform.

Parameters:
  ProjectName:
    Type: String
    Description: Project name used for resource naming.

  Environment:
    Type: String
    Description: Deployment environment.
    AllowedValues:
      - dev
      - test
      - prod

Resources:
  MediaTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ProjectName}-${Environment}-media-v2"

      BillingMode: PAY_PER_REQUEST

      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S

      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE

      SSESpecification:
        SSEEnabled: true

      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Layer
          Value: data

Outputs:
  MediaTableName:
    Description: DynamoDB table name for media metadata.
    Value: !Ref MediaTable

  MediaTableArn:
    Description: DynamoDB table ARN for media metadata.
    Value: !GetAtt MediaTable.Arn