<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Multi-Cloud FaaS Platform App</title>
</head>
<body>
  <h1>Multi-Cloud FaaS Platform</h1>

  <p id="status">Checking login status...</p>

  <section id="userInfo" style="display: none;">
    <h2>Login Successful</h2>

    <p><strong>Email:</strong> <span id="email"></span></p>
    <p><strong>First name:</strong> <span id="givenName"></span></p>
    <p><strong>Last name:</strong> <span id="familyName"></span></p>
    <p><strong>User ID:</strong> <span id="sub"></span></p>

    <button id="logoutButton">Sign out</button>
  </section>

  <hr />

  <section id="uploadSection" style="display: none;">
    <h2>Upload Media File</h2>

    <p>Select an image or video file to upload.</p>

    <input
      id="fileInput"
      type="file"
      accept="image/jpeg,image/png,video/mp4"
    />

    <button id="uploadButton">Upload</button>

    <h3>Result</h3>
    <pre id="uploadResult">No upload yet.</pre>
  </section>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
