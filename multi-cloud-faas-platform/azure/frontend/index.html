<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Multi-Cloud FaaS Platform</title>
</head>
<body>
  <h1>Multi-Cloud FaaS Platform</h1>

  <p>Please sign in to continue.</p>
  <button id="loginButton">Sign in with Cognito</button>

  <script type="module">
    import { config } from "./js/config.js";

    const existingIdToken = sessionStorage.getItem("id_token");

    if (existingIdToken) {
      window.location.href = config.appUrl;
    }

    document.getElementById("loginButton").addEventListener("click", () => {
      const loginUrl =
        `${config.cognitoDomain}/oauth2/authorize?` +
        `client_id=${config.clientId}` +
        `&response_type=code` +
        `&scope=openid+email+profile` +
        `&redirect_uri=${encodeURIComponent(config.redirectUri)}`;

      window.location.href = loginUrl;
    });
  </script>
</body>
</html>
