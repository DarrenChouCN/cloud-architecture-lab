<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Callback - Aussie EcoLens</title>
  <link rel="stylesheet" href="../style.css" />
</head>

<body class="callback-page">
  <div class="bg-grid"></div>
  <div class="bg-orb orb-one"></div>
  <div class="bg-orb orb-two"></div>
  <div class="floating-dot dot-one"></div>
  <div class="floating-dot dot-two"></div>
  <div class="floating-dot dot-three"></div>

  <main class="callback-shell">
    <div class="hero-icon">🔐</div>

    <div class="pill">Secure Authentication</div>

    <h1>Signing you in</h1>

    <p id="status" class="hero-text">
      Exchanging authorization code for tokens...
    </p>

    <div class="loader"></div>
  </main>

  <script type="module">
    import { config } from "../js/config.js";

    const status = document.getElementById("status");

    async function exchangeCodeForTokens(code) {
      const response = await fetch(`${config.cognitoDomain}/oauth2/token`, {
        method: "POST",
        headers: {
          "Content-Type": "application/x-www-form-urlencoded"
        },
        body: new URLSearchParams({
          grant_type: "authorization_code",
          client_id: config.clientId,
          code: code,
          redirect_uri: config.redirectUri
        })
      });

      if (!response.ok) {
        const errorText = await response.text();
        throw new Error(errorText);
      }

      return response.json();
    }

    async function main() {
      const params = new URLSearchParams(window.location.search);
      const code = params.get("code");
      const error = params.get("error");

      if (error) {
        status.textContent = `Login failed: ${error}`;
        return;
      }

      if (!code) {
        status.textContent = "No authorization code found.";
        return;
      }

      try {
        const tokens = await exchangeCodeForTokens(code);

        sessionStorage.setItem("id_token", tokens.id_token);
        sessionStorage.setItem("access_token", tokens.access_token);

        if (tokens.refresh_token) {
          sessionStorage.setItem("refresh_token", tokens.refresh_token);
        }

        status.textContent = "Login successful. Redirecting...";

        window.location.href = config.appUrl;
      } catch (error) {
        console.error("Token exchange failed:", error);
        status.textContent = "Token exchange failed. Check console for details.";
      }
    }

    main();
  </script>
</body>
</html>
