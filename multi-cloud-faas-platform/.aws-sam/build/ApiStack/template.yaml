AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: API Gateway layer for the multi-cloud FaaS platform.
Parameters:
  ProjectName:
    Type: String
    Description: Project name used for resource naming.
  Environment:
    Type: String
    Description: Deployment environment.
    AllowedValues:
    - dev
    - test
    - prod
  UserPoolIssuer:
    Type: String
    Description: Cognito User Pool issuer URL.
  UserPoolClientId:
    Type: String
    Description: Cognito User Pool App Client ID used as JWT audience.
  CorsAllowedOrigins:
    Type: CommaDelimitedList
    Description: Allowed frontend origins for browser requests.
    Default: http://localhost:3000,http://localhost:5173
  StorageBucketName:
    Type: String
    Description: S3 bucket used for private image assets.
  AssetsPrefix:
    Type: String
    Description: S3 prefix for private image assets.
    Default: assets/
  MediaTableName:
    Type: String
    Description: DynamoDB table name for media metadata.
  MediaTableArn:
    Type: String
    Description: DynamoDB table ARN for media metadata.
Resources:
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      Name:
        Fn::Sub: ${ProjectName}-${Environment}-api
      CorsConfiguration:
        AllowOrigins:
          Ref: CorsAllowedOrigins
        AllowHeaders:
        - Authorization
        - Content-Type
        - X-Amz-Date
        - X-Api-Key
        - X-Amz-Security-Token
        AllowMethods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
        MaxAge: 600
      Auth:
        DefaultAuthorizer: CognitoJwtAuthorizer
        Authorizers:
          CognitoJwtAuthorizer:
            IdentitySource: $request.header.Authorization
            JwtConfiguration:
              issuer:
                Ref: UserPoolIssuer
              audience:
              - Ref: UserPoolClientId
      Tags:
        Project:
          Ref: ProjectName
        Environment:
          Ref: Environment
        Layer: api
  UploadInitFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: ${ProjectName}-${Environment}-upload-init
      Runtime: python3.12
      Handler: app.lambda_handler
      CodeUri: UploadInitFunction
      Timeout: 10
      MemorySize: 128
      Role:
        Fn::Sub: arn:${AWS::Partition}:iam::${AWS::AccountId}:role/LabRole
      Environment:
        Variables:
          MEDIA_BUCKET:
            Ref: StorageBucketName
          MEDIA_TABLE:
            Ref: MediaTableName
          ASSETS_PREFIX:
            Ref: AssetsPrefix
          PRESIGNED_URL_EXPIRES_IN: '3600'
      Events:
        UploadInitRoute:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: HttpApi
            Path: /uploads/init
            Method: POST
            Auth:
              Authorizer: CognitoJwtAuthorizer
    Metadata:
      SamResourceId: UploadInitFunction
Outputs:
  ApiId:
    Description: API Gateway HTTP API ID.
    Value:
      Ref: HttpApi
  ApiEndpoint:
    Description: API Gateway HTTP API endpoint.
    Value:
      Fn::Sub: https://${HttpApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}
  CognitoAuthorizerName:
    Description: Cognito JWT authorizer name used by this API.
    Value: CognitoJwtAuthorizer
